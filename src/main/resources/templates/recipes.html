<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Книга Рецептів - Spring Boot App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

<header class="bg-gradient-to-r from-orange-500 to-red-600 text-white shadow-md">
    <div class="container mx-auto px-4 py-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight">🍽️ CookBook Start-up</h1>
            <p class="text-orange-100 text-sm mt-1">Лабораторна работа: REST-застосунок на Spring Boot </p>
        </div>

        <button onclick="runParser()" class="bg-white text-orange-600 font-bold px-6 py-3 rounded-xl shadow-lg hover:bg-orange-50 transition-all transform hover:scale-105">
            🔌 Нові рецепти (Jsoup)
        </button>
    </div>
</header>

<main class="container mx-auto px-4 py-8">

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
            <h2 class="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
                ✍️ Додати новий рецепт
            </h2>

            <form th:action="@{/recipes/add}" th:object="${newRecipe}" method="POST" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Назва страви</label>
                    <input type="text" th:field="*{title}" placeholder="Наприклад: Борщ домашній" required
                           class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Категорія</label>
                    <select th:field="*{categoryId}" required
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                        <option value="" disabled selected>Оберіть категорію...</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Короткий опис</label>
                    <textarea th:field="*{description}" placeholder="Трошки про страву..." rows="2"
                              class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"></textarea>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Складові</label>
                    <textarea th:field="*{ingredients}" placeholder="М'ясо, картопля, буряк..." rows="2"
                              class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"></textarea>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Інструкція з приготування</label>
                    <textarea th:field="*{instructions}" placeholder="1. Зварити бульйон... 2. Нарізати овочі..." rows="3"
                              class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"></textarea>
                </div>

                <button type="submit"
                        class="w-full bg-orange-500 text-white font-bold py-3 rounded-lg hover:bg-orange-600 transition-colors shadow-sm">
                    💾 Зберегти в Базу Даних
                </button>
            </form>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <h2 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
                📖 Книга рецептів (<span th:text="${recipes.size()}">0</span>)
            </h2>

            <div th:if="${recipes.isEmpty()}" class="bg-orange-50 border border-orange-100 p-8 rounded-2xl text-center">
                <p class="text-lg text-orange-800 font-medium">Книга рецептів пуста 🧐</p>
                <p class="text-sm text-orange-600 mt-1">Додайте рецепт зліва або натисні парсинг нового</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div th:each="recipe : ${recipes}" class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start gap-2 mb-3">
                                <span class="bg-orange-100 text-orange-800 text-xs font-semibold px-2.5 py-1 rounded-full"
                                      th:text="${recipe.categoryName}">Категорія</span>

                            <a th:href="@{'/recipes/delete/' + ${recipe.id}}"
                               class="text-gray-400 hover:text-red-500 transition-colors p-1"
                               onclick="return confirm('Видалити цей рецепт з бази даних?')">
                                🗑️
                            </a>
                        </div>

                        <h3 class="text-lg font-bold text-gray-900 mb-2" th:text="${recipe.title}">Назва рецепту</h3>
                        <p class="text-gray-600 text-sm mb-4 italic" th:text="${recipe.description}">Кророткий опис...</p>

                        <div class="bg-gray-50 p-3 rounded-xl mb-4">
                            <h4 class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">🛒 Інгрідієнти:</h4>
                            <p class="text-xs text-gray-700 leading-relaxed" th:text="${recipe.ingredients}"></p>
                        </div>

                        <div class="text-xs text-gray-700">
                            <h4 class="font-bold text-gray-500 uppercase tracking-wide mb-1">👨‍🍳 Інструкція:</h4>
                            <p class="leading-relaxed whitespace-pre-line" th:text="${recipe.instructions}"></p>
                        </div>
                    </div>

                    <div class="border-t border-gray-100 mt-4 pt-4 text-right text-[10px] text-gray-400">
                        ID в базі даних: <span th:text="${recipe.id}"></span>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<script>
    function runParser() {
        const btn = document.querySelector('button[onclick="runParser()"]');
        const originalText = btn.innerHTML;
        btn.innerHTML = "⏳ Парсінг даних...";
        btn.disabled = true;

        fetch('/api/parser/import', {
            method: 'POST'
        })
            .then(response => response.text())
            .then(data => {
                alert(data);
                location.reload();
            })
            .catch(error => {
                console.error('Помилка парсинга:', error);
                alert('Виникла помилка під часу парсингу');
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
    }
</script>
</body>
</html>
